<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabAI - Edit Doctor</title>
  <link rel="stylesheet" href="../Css/style.css">
  <link rel="stylesheet" href="../Css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="brand-name-sidebar" style="color: white; font-size: 24px; font-weight: 700;">LabAI</h2>
        <p style="font-size: 12px; color: rgba(255,255,255,0.6);">Laboratory reports automation</p>
      </div>

      <nav class="sidebar-nav">
        <a href="admin-dashboard.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </a>
        <a href="patients.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          Patients
        </a>
        <a href="doctors.html" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
          Show All Doctors
        </a>
        <a href="upload-report.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          Upload Report
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="admin-login.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1 style="font-size: 32px; font-weight: 700; color: #2D3436;">Edit Doctor Profile</h1>
        </div>
      </header>

      <div class="content-section" style="max-width: 900px;">
        <form action="doctors.html" method="POST">
          <!-- Row 1: Names -->
          <div class="form-grid-2">
            <div class="form-group">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" name="first_name" placeholder="Dr. First Name" value="Priya" required>
            </div>
            <div class="form-group">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" name="last_name" placeholder="Last Name" value="Sharma" required>
            </div>
          </div>

          <!-- Specialization -->
          <div class="form-group">
            <label for="specialization">Specialization</label>
            <select id="specialization" name="specialization" style="width: 100%; padding: 16px; background-color: var(--input-bg); border: 1px solid transparent; border-radius: var(--input-border-radius); font-size: 16px; appearance: none; cursor: pointer;">
              <option value="">Select specialization</option>
              <option value="endocrinology" selected>Endocrinology</option>
              <option value="cardiology">Cardiology</option>
              <option value="internal_medicine">Internal Medicine</option>
              <option value="neurology">Neurology</option>
              <option value="pediatrics">Pediatrics</option>
            </select>
          </div>

          <!-- Hospital -->
          <div class="form-group">
            <label for="hospital">Hospital / Clinic</label>
            <input type="text" id="hospital" name="hospital" placeholder="e.g., City General Hospital" value="City General Hospital" required>
          </div>

          <!-- Row 2: Contact -->
          <div class="form-grid-2">
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 555-0000" value="+1 555-0123" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="doctor@hospital.com" value="p.sharma@hospital.com" required>
            </div>
          </div>

          <!-- Actions -->
          <div style="display: flex; gap: 16px; margin-top: 32px;">
            <button type="submit" class="submit-btn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
              <svg style="width: 20px; height: 20px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              Save Changes
            </button>
            <button type="button" class="btn-secondary" style="width: 120px;" onclick="location.href='doctors.html'">Cancel</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
