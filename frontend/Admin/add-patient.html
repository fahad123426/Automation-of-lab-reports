<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabAI - Add Patient</title>
  <link rel="stylesheet" href="../Css/style.css">
  <link rel="stylesheet" href="../Css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="brand-name-sidebar">LabAI</h2>
        <p style="font-size: 12px; color: rgba(255,255,255,0.6);">Laboratory reports automation</p>
      </div>

      <nav class="sidebar-nav">
        <a href="admin-dashboard.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </a>
        <a href="patients.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          Patients
        </a>
        <a href="upload-report.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          Upload Report
        </a>
        <a href="add-doctor.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
          Add Doctor
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="admin-login.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1>Add New Patient</h1>
        </div>
        <div class="top-bar-right">
          <div class="admin-info">
            <span style="font-weight: 500; font-size: 15px;">Admin Fahad</span>
            <div class="admin-avatar">AF</div>
          </div>
        </div>
      </header>

      <div class="content-section" style="max-width: 800px;">
        <div class="section-header">
          <h2 class="section-title">Patient Information</h2>
        </div>
        
        <form action="#" method="POST">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="form-group">
              <label for="p-name">Full Name</label>
              <input type="text" id="p-name" name="name" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
              <label for="p-email">Email Address</label>
              <input type="email" id="p-email" name="email" placeholder="john@example.com" required>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="form-group">
              <label for="p-phone">Phone Number</label>
              <input type="tel" id="p-phone" name="phone" placeholder="+1 (555) 000-0000">
            </div>
            <div class="form-group">
              <label for="p-dob">Date of Birth</label>
              <input type="date" id="p-dob" name="dob">
            </div>
          </div>

          <div class="form-group">
            <label for="p-history">Medical History / Notes</label>
            <textarea id="p-history" name="history" style="width: 100%; min-height: 120px; padding: 16px; background-color: var(--input-bg); border: 1px solid transparent; border-radius: var(--input-border-radius); font-size: 16px; transition: var(--transition); resize: vertical;" placeholder="Enter any known allergies, chronic conditions, or general history..."></textarea>
          </div>

          <div style="display: flex; gap: 16px; margin-top: 16px;">
            <button type="submit" class="submit-btn" style="flex: 1;">Register Patient</button>
            <button type="reset" class="submit-btn" style="flex: 1; background-color: #f1f1f1; color: #333;">Clear Form</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
