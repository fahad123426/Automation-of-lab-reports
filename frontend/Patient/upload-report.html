<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabAI - Upload Report</title>
  <link rel="stylesheet" href="../Css/style.css">
  <link rel="stylesheet" href="../Css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="brand-name-sidebar" style="color: white; font-size: 24px; font-weight: 700;">LabAI</h2>
        <p style="font-size: 12px; color: rgba(255,255,255,0.6);">Laboratory reports automation</p>
      </div>

      <nav class="sidebar-nav">
        <a href="patient-dashboard.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </a>
        <a href="my-reports.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          My Reports
        </a>
        <a href="upload-report.html" class="nav-item active">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          Upload Report
        </a>
        <a href="update-history.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
          Medical History
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="patient-login.html" class="nav-item">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1 style="font-size: 32px; font-weight: 700; color: #2D3436;">Upload Report</h1>
        </div>
        <div class="top-bar-right">
          <div class="admin-info">
            <span style="font-weight: 500; font-size: 15px;">Sarah Johnson</span>
            <div class="admin-avatar" style="background-color: #769382;">SJ</div>
          </div>
        </div>
      </header>

      <div class="content-section" style="max-width: 900px;">
        <form action="analysis.html" method="GET" enctype="multipart/form-data">
          <!-- File Upload Zone -->
          <div style="border: 2px dashed #CCCCCC; border-radius: 16px; padding: 60px 40px; text-align: center; background-color: white; margin-bottom: 32px; transition: all 0.3s ease;">
            <div class="action-icon-box" style="margin-bottom: 20px;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
            </div>
            <h3 style="font-size: 20px; font-weight: 700; color: #2D3436; margin-bottom: 8px;">Upload your lab report</h3>
            <p style="font-size: 14px; color: #999;">PDF, JPG, PNG up to 10MB</p>
            <input type="file" id="patient-report" style="display: none;">
            <button type="button" class="submit-btn" style="width: auto; padding: 12px 24px; margin-top: 24px;" onclick="document.getElementById('patient-report').click()">Choose File</button>
          </div>

          <!-- AI Ask Section -->
          <div class="history-section" style="margin-bottom: 0;">
            <label class="query-label">
              <svg class="sparkle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" />
              </svg>
              Ask AI about your report (optional)
            </label>
            <textarea class="query-textarea" placeholder="e.g., What does my cholesterol level mean? Should I be concerned about my hemoglobin?"></textarea>
          </div>

          <!-- Analyze Button -->
          <button type="submit" class="analyze-btn">
            <svg style="width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" />
            </svg>
            Analyze Report
          </button>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
